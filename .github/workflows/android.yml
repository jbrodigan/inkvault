name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
  workflow_dispatch:

# Don't let rapid pushes pile up redundant runs (the emulator job is the pricey one): a newer
# commit on the same branch cancels the older in-flight run. Saves Actions minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: android

jobs:
  unit:
    name: Build + JVM unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        continue-on-error: true # setup-android@v3's sdkmanager flakes intermittently; the next step recovers
        uses: android-actions/setup-android@v4

      - name: Ensure SDK platform + licenses (resilient; retries the flaky sdkmanager)
        run: |
          sdkm="$(command -v sdkmanager || echo "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager")"
          yes | "$sdkm" --licenses >/dev/null 2>&1 || true
          for i in 1 2 3; do
            "$sdkm" "platform-tools" "platforms;android-37" && break
            echo "sdkmanager attempt $i failed; retrying in $((i * 5))s"; sleep $((i * 5))
          done || echo "android-37 not in the sdkmanager channel; AGP will auto-download"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests (no device, no hardware)
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Verify no telemetry (privacy guardrail — DESIGN.md hard rule)
        run: ./gradlew :app:verifyNoTelemetry --stacktrace

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: android/app/build/reports/tests/

  instrumented:
    name: Emulator instrumented tests
    runs-on: ubuntu-latest
    # Everything except the physical pen link: Room, lifecycle, BLE permission flow on a real
    # Android image. No pen is attached, so this never covers the LAMY GO/NO-GO.
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
        working-directory: .

      - name: Set up Android SDK
        continue-on-error: true # setup-android@v3's sdkmanager flakes intermittently; the next step recovers
        uses: android-actions/setup-android@v4

      - name: Ensure SDK platform + licenses (resilient; retries the flaky sdkmanager)
        run: |
          sdkm="$(command -v sdkmanager || echo "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager")"
          yes | "$sdkm" --licenses >/dev/null 2>&1 || true
          for i in 1 2 3; do
            "$sdkm" "platform-tools" "platforms;android-37" && break
            echo "sdkmanager attempt $i failed; retrying in $((i * 5))s"; sleep $((i * 5))
          done || echo "android-37 not in the sdkmanager channel; AGP will auto-download"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          working-directory: android
          script: ./gradlew :app:connectedDebugAndroidTest --stacktrace
