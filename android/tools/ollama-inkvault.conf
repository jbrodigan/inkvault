# Ollama systemd drop-in for the InkVault OCR node (OCR host). OCR_PIPELINE.md Stage 1a.
#
# Install:
#   sudo install -Dm644 ollama-inkvault.conf /etc/systemd/system/ollama.service.d/inkvault.conf
#   sudo systemctl daemon-reload
#   sudo systemctl restart ollama
# (or paste the [Service] block via `sudo systemctl edit ollama`)
#
# Verify:  systemctl show ollama -p Environment   # should list these
#          curl http://192.168.X.X:11434/api/tags   # reachable off-box

[Service]
Environment="OLLAMA_HOST=0.0.0.0:11434"        # LAN + tailnet reachable (was tailnet-only; finding #4)
Environment="OLLAMA_KEEP_ALIVE=-1"             # keep the model resident (dedicated GPU)
Environment="OLLAMA_FLASH_ATTENTION=1"         # faster + less KV memory at long context
Environment="OLLAMA_KV_CACHE_TYPE=q8_0"        # ~halve KV memory, negligible quality loss
Environment="OLLAMA_NUM_PARALLEL=1"            # one page at a time → all VRAM for context
