org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.caching=true
org.gradle.parallel=true
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# AGP 9 enables built-in Kotlin + a new DSL by default, which conflicts with our separately-applied
# org.jetbrains.kotlin.android plugin (and KSP/compose/serialization wiring). Opt out to keep the
# existing, working plugin setup. Note: this opt-out is removed in AGP 10 — migrate to built-in
# Kotlin (developer.android.com/build/migrate-to-built-in-kotlin) before then.
android.builtInKotlin=false
android.newDsl=false
